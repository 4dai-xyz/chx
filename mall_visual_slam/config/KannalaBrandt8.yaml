%YAML:1.0
# Industrial USB Camera Calibration (1920x1080)
# Auto-generated by scripts/calibrate_camera.py
# 标定视图数: 40, RMS=1.920px
Initializer.initialization: 1

#---------------------------------------------
# 相机参数 (OpenCV PinHole)
#---------------------------------------------
Camera.type: "PinHole"
Camera.fx: 1142.5149
Camera.fy: 1208.9571
Camera.cx: 995.7200
Camera.cy: 499.4031
Camera.k1: 0.298296
Camera.k2: -0.863055
Camera.k3: 1.041614
Camera.p1: 0.020866
Camera.p2: 0.002167

Camera.width: 1920
Camera.height: 1080

# 相机帧率 (fps)
Camera.fps: 30.0

# 彩色/灰度
Camera.RGB: 1

#---------------------------------------------
# ORB 特征点参数
#---------------------------------------------
ORBextractor.nFeatures: 4000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 5
ORBextractor.minThFAST: 2

#---------------------------------------------
# 跟踪参数
#---------------------------------------------
Tracker.kfDist: 0.02
Tracker.kfDistLC: 0.05
Tracker.kfDistLC2: 0.02
Tracker.monoFOV: 20
Tracker.monoSigma: 0.04
Tracker.monoMinConf: 0.3
Tracker.monoMaxFrames: 30

#---------------------------------------------
# 优化参数
#---------------------------------------------
Optimizer.numIterations: 5
Optimizer.numIterationsIni: 5
Optimizer.numIterationsBA: 5

#---------------------------------------------
# 重载与缩放参数 (初始化需要)
#---------------------------------------------
LocalMapping.nFeatures: 4000
LocalMapping.scaleFactor: 1.2
LocalMapping.nLevels: 8

# Viewer 参数
#---------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500
